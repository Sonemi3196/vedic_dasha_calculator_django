{% block extra_css %}

    .maha-5 { background: linear-gradient(135deg, #14b8a6, #0d9488) !important; }
    .maha-6 { background: linear-gradient(135deg, #3b82f6, #2563eb) !important; }
    .maha-7 { background: linear-gradient(135deg, #8b5cf6, #7c3aed) !important; }

    .antara-5 { background: linear-gradient(135deg, #5eead4, #14b8a6) !important; }

    .antara-7 { background: linear-gradient(135deg, #c4b5fd, #8b5cf6) !important; }
    .antara-8 { background: linear-gradient(135deg, #f9a8d4, #ec4899) !important; }

    /* ボタンの色分け */

        background: linear-gradient(135deg, #f59e0b, #d97706);

    .btn-filter {

    .btn-clear {

{% block content %}

{% block extra_js %}
<script>
let allData = null;
let filteredData = null;
let personAData = null;
let personBData = null;

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

function switchCompareTab(tabName) {
    // タブボタンの切り替え
    document.querySelectorAll('[id^="tab-"]').forEach(btn => {
        btn.classList.remove('border-purple-600', 'text-purple-600');
        btn.classList.add('border-transparent', 'text-gray-500');
    });
    document.getElementById('tab-' + tabName).classList.add('border-purple-600', 'text-purple-600');
    document.getElementById('tab-' + tabName).classList.remove('border-transparent', 'text-gray-500');
    
    // コンテンツの切り替え
    document.querySelectorAll('.tab-content').forEach(content => {
        content.classList.add('hidden');
    });
    document.getElementById('content-' + tabName).classList.remove('hidden');
}

function compareAll() {
    const personAName = document.getElementById('personAName').value;
    const personBName = document.getElementById('personBName').value;
    const personABirth = document.getElementById('personABirth').value;
    const personBBirth = document.getElementById('personBBirth').value;

    if (!personABirth || !personBBirth) {
        alert('両方の生年月日を入力してください');
        return;
    }

    document.getElementById('resultsContainer').classList.remove('hidden');
    document.getElementById('dashaResults').innerHTML = '<div class="text-center py-8">計算中...</div>';

    // ダシャー比較データを取得
    fetch('/compare/calculate/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken')
        },
        credentials: 'include',  // ← これがないとクッキーが送られない！
        body: JSON.stringify({
            person_a_name: personAName,
            person_a_birth: personABirth,
            person_b_name: personBName,
            person_b_birth: personBBirth
        })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            allData = data;
            filteredData = data.timeline;
            document.getElementById('filterSection').classList.remove('hidden');
            displayDashaComparison();
        } else {
            document.getElementById('dashaResults').innerHTML = `<div class="text-red-600 text-center">エラー: ${data.error}</div>`;
        }
    })
    .catch(error => {
        document.getElementById('dashaResults').innerHTML = `<div class="text-red-600 text-center">エラー: ${error.message}</div>`;
    });

    // 各人の数秘術データを取得
    fetchNumerologyData(personAName, personABirth, 'A');
    fetchNumerologyData(personBName, personBBirth, 'B');
}

function fetchNumerologyData(name, birthDate, person) {
    fetch('/calculate/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name, birth_date: birthDate })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success && data.numerology) {
            if (person === 'A') {
                personAData = data.numerology;
            } else {
                personBData = data.numerology;
            }
            
            // 両方のデータが揃ったらグリッド比較を表示
            if (personAData && personBData) {
                displayGridComparison();
            }
        }
    })
    .catch(error => {
        console.error('数秘術データ取得エラー:', error);
    });
}

function displayDashaComparison() {
    const resultsDiv = document.getElementById('dashaResults');
    const today = new Date();
    const currentYear = today.getFullYear();
    const currentMonth = today.getMonth() + 1;
    
    const yearGroups = {};
    filteredData.forEach(item => {
        if (!yearGroups[item.year]) {
            yearGroups[item.year] = [];
        }
        yearGroups[item.year].push(item);
    });
    
    let html = '<h2 class="text-xl font-bold mb-4">ダシャー比較結果</h2>';
    
    Object.keys(yearGroups).sort((a, b) => a - b).forEach(year => {
        const isCurrentYear = parseInt(year) === currentYear;
        const yearData = yearGroups[year];
        
        html += `
            <div class="year-group">
                <div class="year-header ${isCurrentYear ? '' : 'collapsed'}" onclick="toggleYear(this)">
                    <strong>${year}年 (${yearData.length}ヶ月)</strong>
                    <span class="toggle-icon">▼</span>
                </div>
                <div class="year-content ${isCurrentYear ? '' : 'collapsed'}">
                    <table class="comparison-table">
                        <thead>
                            <tr>
                                <th>年月</th>
                                <th>${allData.person_a_name}</th>
                                <th>${allData.person_b_name}</th>
                            </tr>
                        </thead>
                        <tbody>
        `;
        
        yearData.forEach(item => {
            const isCurrentMonth = item.year === currentYear && item.month === currentMonth;
            const rowClass = isCurrentMonth ? 'current-row' : '';
            
            html += `<tr class="${rowClass}">`;
            html += `<td><strong>${item.date_str}</strong></td>`;
            
            html += `<td>`;
            if (item.person_a_age !== null) {
                html += `<div class="age-display">${item.person_a_age}歳</div>`;
                if (item.person_a_maha) {
                    html += `<span class="maha-number maha-${item.person_a_maha}">${item.person_a_maha}</span>`;
                    if (item.person_a_antara) {
                        html += `<span class="antara-number antara-${item.person_a_antara}">${item.person_a_antara}</span>`;
                    }
                }
            } else {
                html += `<span style="color: #ccc;">未誕生</span>`;
            }
            html += `</td>`;
            
            html += `<td>`;
            if (item.person_b_age !== null) {
                html += `<div class="age-display">${item.person_b_age}歳</div>`;
                if (item.person_b_maha) {
                    html += `<span class="maha-number maha-${item.person_b_maha}">${item.person_b_maha}</span>`;
                    if (item.person_b_antara) {
                        html += `<span class="antara-number antara-${item.person_b_antara}">${item.person_b_antara}</span>`;
                    }
                }
            } else {
                html += `<span style="color: #ccc;">未誕生</span>`;
            }
            html += `</td>`;
            html += `</tr>`;
        });
        
        html += `
                        </tbody>
                    </table>
                </div>
            </div>
        `;
    });
    
    html += `
        <div style="margin-top: 20px; font-size: 14px; color: #666;">
            <p><span class="maha-number">5</span> = マハーダシャー番号</p>
            <p><span class="antara-number">3</span> = アンタラダシャー番号</p>
        </div>
    `;
    
    resultsDiv.innerHTML = html;
}

function displayGridComparison() {
    if (!personAData || !personBData) {
        document.getElementById('gridResults').innerHTML = '<div class="text-center py-8">データ読み込み中...</div>';
        return;
    }
    
    const gridA = personAData.grid;
    const gridB = personBData.grid;
    
    let html = `
        <h2 class="text-xl font-bold mb-4">グリッド比較</h2>
        
        <!-- 凡例 -->
        <div class="flex justify-center gap-6 mb-6 p-4 bg-gray-50 rounded-lg">
            <div class="flex items-center gap-2">
                <div class="w-6 h-6 rounded" style="background: linear-gradient(135deg, #a855f7, #9333ea);"></div>
                <span class="font-semibold">${allData.person_a_name}</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-6 h-6 rounded" style="background: linear-gradient(135deg, #3b82f6, #2563eb);"></div>
                <span class="font-semibold">${allData.person_b_name}</span>
            </div>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
            <!-- 人A -->
            <div>
                <h3 class="text-lg font-bold text-center mb-4 text-purple-600">${allData.person_a_name}</h3>
                <div class="grid grid-cols-3 gap-3 max-w-xs mx-auto">
                    ${[3,1,9,6,7,5,2,8,4].map(n => 
                        `<div class="aspect-square bg-white border-2 border-purple-300 rounded-lg flex items-center justify-center text-3xl font-bold text-purple-600">
                            ${gridA[n] || ''}
                        </div>`
                    ).join('')}
                </div>
            </div>
            
            <!-- 人B -->
            <div>
                <h3 class="text-lg font-bold text-center mb-4 text-blue-600">${allData.person_b_name}</h3>
                <div class="grid grid-cols-3 gap-3 max-w-xs mx-auto">
                    ${[3,1,9,6,7,5,2,8,4].map(n => 
                        `<div class="aspect-square bg-white border-2 border-blue-300 rounded-lg flex items-center justify-center text-3xl font-bold text-blue-600">
                            ${gridB[n] || ''}
                        </div>`
                    ).join('')}
                </div>
            </div>
        </div>
        
        <!-- 重ね合わせグリッド -->
        <div>
            <h3 class="text-lg font-bold text-center mb-4">重ね合わせ</h3>
            <div class="grid grid-cols-3 gap-3 max-w-xs mx-auto">
                ${[3,1,9,6,7,5,2,8,4].map(n => {
                    const strA = gridA[n] || '';
                    const strB = gridB[n] || '';
                    
                    // 人Aの数字（紫）と人Bの数字（青）を色分けして表示
                    let displayContent = '';
                    
                    // 人Aの数字を紫で表示
                    if (strA) {
                        displayContent += `<span style="color: #a855f7;">${strA}</span>`;
                    }
                    
                    // 人Bの数字を青で表示
                    if (strB) {
                        displayContent += `<span style="color: #3b82f6;">${strB}</span>`;
                    }
                    
                    // 持っていない場合は空のマス
                    return `<div class="aspect-square bg-white border-2 border-gray-300 rounded-lg flex items-center justify-center text-3xl font-bold p-2" style="letter-spacing: -3px; line-height: 1;">
                        ${displayContent || ''}
                    </div>`;
                }).join('')}
            </div>
        </div>
    `;
    
    document.getElementById('gridResults').innerHTML = html;
}

// 以下、既存の関数（toggleYear, expandAll, collapseAll, applyFilter, clearFilter）

function toggleYear(header) {
    header.classList.toggle('collapsed');
    const content = header.nextElementSibling;
    content.classList.toggle('collapsed');
}

function expandAll() {
    document.querySelectorAll('.year-header').forEach(h => h.classList.remove('collapsed'));
    document.querySelectorAll('.year-content').forEach(c => c.classList.remove('collapsed'));
}

function collapseAll() {
    document.querySelectorAll('.year-header').forEach(h => h.classList.add('collapsed'));
    document.querySelectorAll('.year-content').forEach(c => c.classList.add('collapsed'));
}

function applyFilter() {
    const filterYear = document.getElementById('filterYear').value;
    const filterAge = document.getElementById('filterAge').value;
    const filterMaha = document.getElementById('filterMaha').value;
    
    filteredData = allData.timeline.filter(item => {
        if (filterYear && item.year !== parseInt(filterYear)) return false;
        if (filterAge && item.person_a_age !== parseInt(filterAge) && item.person_b_age !== parseInt(filterAge)) return false;
        if (filterMaha && item.person_a_maha !== parseInt(filterMaha) && item.person_b_maha !== parseInt(filterMaha)) return false;
        return true;
    });
    
    displayDashaComparison();
    expandAll();
}

function clearFilter() {
    document.getElementById('filterYear').value = '';
    document.getElementById('filterAge').value = '';
    document.getElementById('filterMaha').value = '';
    filteredData = allData.timeline;
    displayDashaComparison();
}

document.addEventListener('DOMContentLoaded', function() {
    // LocalStorageから人Aのデータを読み込み
    const personAName = localStorage.getItem('personA_name');
    const personABirth = localStorage.getItem('personA_birth');
    
    if (personAName) {
        document.getElementById('personAName').value = personAName;
    }
    
    if (personABirth) {
        document.getElementById('personABirth').value = personABirth;
    } else {
        const today = new Date();
        const thirtyYearsAgo = new Date(today.getFullYear() - 30, today.getMonth(), today.getDate());
        document.getElementById('personABirth').value = thirtyYearsAgo.toISOString().split('T')[0];
    }
    
    const today = new Date();
    const twentyFiveYearsAgo = new Date(today.getFullYear() - 25, today.getMonth(), today.getDate());
    document.getElementById('personBBirth').value = twentyFiveYearsAgo.toISOString().split('T')[0];
});
</script>
